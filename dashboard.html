<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ผลการประเมินนักเรียน | SSK Smart Reader</title>
  
  <!-- นำเข้า Bootstrap, Icons & Chart.js -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <!-- นำเข้า Google Font Sarabun -->
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    /* บังคับใช้ฟอนต์มาตรฐาน Sarabun ทั้งระบบ */
    * { font-family: 'Sarabun', sans-serif !important; }
    body { background-color: #f0f4f8; padding-bottom: 80px; }
    
    .hero-header { background: linear-gradient(135deg, #0d6efd 0%, #4a00e0 100%); padding: 30px 20px 60px; color: white; text-align: center; border-radius: 0 0 40px 40px; box-shadow: 0 10px 30px rgba(13, 110, 253, 0.2); position: relative; }
    .btn-logout { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2); border: none; border-radius: 50px; padding: 5px 15px; color: white; font-size: 0.9rem; backdrop-filter: blur(5px); }
    .profile-box { background: white; border-radius: 20px; padding: 20px; margin: -40px 20px 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); text-align: center; position: relative; }
    .stu-photo { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 4px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.15); margin-top: -60px; background-color: #f8f9fa; }
    
    .card-stat { background: white; border-radius: 18px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.04); margin-bottom: 15px; overflow: hidden; }
    .progress { height: 12px; border-radius: 10px; background-color: #e9ecef; margin-top: 8px; }
    .pg-read { background: linear-gradient(90deg, #6ea8fe, #0d6efd); }
    .pg-write { background: linear-gradient(90deg, #75b798, #198754); }
    .pg-think { background: linear-gradient(90deg, #ea868f, #dc3545); }
    
    .chart-container { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.04); margin-bottom: 20px; }
    .timeline { border-left: 3px solid #dee2e6; margin-left: 15px; padding-left: 20px; padding-top: 5px; }
    .timeline-item { position: relative; margin-bottom: 25px; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 3px 10px rgba(0,0,0,0.03); border: 1px solid #f1f3f5;}
    .timeline-item::before { content: ''; position: absolute; left: -29px; top: 15px; width: 15px; height: 15px; background: #0d6efd; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.2); }
    
    .btn-cert { background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%); border: none; color: #000; font-weight: bold; border-radius: 10px; padding: 6px 15px; font-size: 0.85rem;}
    .btn-port { border: 2px solid #198754; color: #198754; font-weight: bold; border-radius: 10px; padding: 5px 15px; font-size: 0.85rem; background: transparent; text-decoration: none; display: inline-block; text-align: center;}
    
    #loader { position: fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center; }
  </style>
</head>
<body>

  <!-- หน้าจอโหลดข้อมูล -->
  <div id="loader">
    <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status"></div>
    <h5 class="mt-3 fw-bold text-primary">กำลังดึงข้อมูลนักเรียน...</h5>
  </div>

  <div class="hero-header">
    <button class="btn-logout" onclick="logoutParent()"><i class="bi bi-box-arrow-right"></i> ออกจากระบบ</button>
    <h4 class="fw-bold mb-1 mt-2">รายงานผลสมรรถนะอัจฉริยะ</h4>
    <p class="mb-0 text-white-50 small">SSK Smart Reader โรงเรียนบ้านสองสะโกม</p>
  </div>

  <div class="profile-box">
    <img id="stuPhoto" src="https://via.placeholder.com/100?text=Photo" class="stu-photo" alt="Student Photo">
    <h4 class="fw-bold text-dark mt-3 mb-1" id="stuName">กำลังโหลด...</h4>
    <span class="badge bg-primary bg-opacity-10 text-primary px-3 py-2 rounded-pill fw-bold border border-primary border-opacity-25">
      <i class="bi bi-mortarboard-fill me-1"></i> ชั้น <span id="stuClass">-</span>
    </span>
  </div>

  <div class="container px-3" id="mainContent" style="display: none;">
    <!-- กล่องแสดงค่าเฉลี่ย 3 ด้านล่าสุด -->
    <h6 class="fw-bold text-secondary mb-3"><i class="bi bi-bar-chart-fill text-primary"></i> ผลประเมินสัปดาห์ล่าสุด</h6>
    <div class="row g-2 mb-4">
      <div class="col-4">
        <div class="card-stat p-3 text-center border-bottom border-primary border-3">
          <div class="text-primary fs-3 mb-1"><i class="bi bi-book"></i></div>
          <div class="small fw-bold text-muted mb-1">การอ่าน</div>
          <h4 class="fw-bold text-dark mb-0" id="scoreR">-</h4>
        </div>
      </div>
      <div class="col-4">
        <div class="card-stat p-3 text-center border-bottom border-success border-3">
          <div class="text-success fs-3 mb-1"><i class="bi bi-pencil-square"></i></div>
          <div class="small fw-bold text-muted mb-1">การเขียน</div>
          <h4 class="fw-bold text-dark mb-0" id="scoreW">-</h4>
        </div>
      </div>
      <div class="col-4">
        <div class="card-stat p-3 text-center border-bottom border-danger border-3">
          <div class="text-danger fs-3 mb-1"><i class="bi bi-lightbulb"></i></div>
          <div class="small fw-bold text-muted mb-1">การคิด</div>
          <h4 class="fw-bold text-dark mb-0" id="scoreT">-</h4>
        </div>
      </div>
    </div>

    <!-- กราฟใยแมงมุม -->
    <div class="chart-container">
      <h6 class="fw-bold text-dark mb-3 text-center">กราฟวิเคราะห์ทักษะ 9 มิติ (ล่าสุด)</h6>
      <div style="position: relative; height: 260px; width: 100%;">
        <canvas id="radarChart"></canvas>
      </div>
    </div>

    <!-- ประวัติการประเมิน -->
    <h6 class="fw-bold text-secondary mt-4 mb-3"><i class="bi bi-clock-history text-primary"></i> ประวัติการบันทึกคะแนน</h6>
    <div class="timeline" id="timelineContainer"></div>
  </div>

  <script>
    // 🚩 เปลี่ยนตรงนี้ให้เป็น URL Web App อันใหม่ล่าสุดจาก Google Script ของคุณนคร
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyDt9mCG5oj1rO9oCUcuo4kEN90lSMbRbsDeEh2CDpp1ELW17STtiwkDCOK2OuriPIG/exec";
    let myRadarChart;

    document.addEventListener("DOMContentLoaded", function() {
      // ดึงรหัสนักเรียนจาก URL
      const urlParams = new URLSearchParams(window.location.search);
      const stuId = urlParams.get('stuId');

      if (!stuId) {
        window.location.href = "index.html"; // ถ้าไม่มีรหัส เตะกลับไปหน้า Login
        return;
      }

      // ดึงข้อมูลผ่าน API ด้วย fetch
      fetch(`${GOOGLE_SCRIPT_URL}?action=getDashboard&stuId=${stuId}`)
        .then(response => response.json())
        .then(result => {
          if (result.status === "success") {
            renderDashboard(result.data);
          } else {
            showError(result.message);
          }
        })
        .catch(err => showError(err.message));
    });

    function showError(msg) {
      document.getElementById("loader").innerHTML = `
        <div class="text-center p-4">
          <i class="bi bi-exclamation-triangle-fill text-danger fs-1"></i>
          <h5 class="text-danger mt-3 fw-bold">เกิดข้อผิดพลาด</h5>
          <p class="text-muted">${msg}</p>
          <button class="btn btn-primary rounded-pill px-4 mt-3 fw-bold" onclick="logoutParent()">กลับไปหน้าล็อกอิน</button>
        </div>`;
    }

    function renderDashboard(data) {
      document.getElementById("loader").style.display = "none";
      document.getElementById("mainContent").style.display = "block";
      
      document.getElementById("stuName").innerText = data.studentName;
      document.getElementById("stuClass").innerText = data.classRoom;
      if(data.photo) document.getElementById("stuPhoto").src = data.photo;

      const history = data.history;
      const timeline = document.getElementById("timelineContainer");

      if (!history || history.length === 0) {
        timeline.innerHTML = `<div class="text-center p-4 bg-white rounded-4 shadow-sm border border-light"><i class="bi bi-inbox fs-1 text-muted"></i><p class="mt-2 text-secondary fw-bold">ยังไม่มีข้อมูลการประเมิน</p></div>`;
        return;
      }

      const latest = history[0];
      document.getElementById("scoreR").innerText = latest.avgR;
      document.getElementById("scoreW").innerText = latest.avgW;
      document.getElementById("scoreT").innerText = latest.avgT;

      drawRadarChart(latest.rawScores);

      let html = "";
      history.forEach((rec, index) => {
        let isLatest = index === 0 ? `<span class="badge bg-danger ms-2">ล่าสุด</span>` : "";
        
        // หมายเหตุ: ปุ่มดาวน์โหลดเกียรติบัตรถูกซ่อนไว้ชั่วคราวจนกว่าเราจะทำ API โหลดไฟล์เสร็จ
        // let certBtn = rec.totalAvg >= 4.5 ? `<button class="btn btn-cert w-100 shadow-sm"><i class="bi bi-trophy-fill"></i> ดาวน์โหลดเกียรติบัตร</button>` : "";
        let portBtn = rec.portfolio ? `<a href="${rec.portfolio}" target="_blank" class="btn btn-port w-100"><i class="bi bi-image"></i> ดูแฟ้มผลงาน</a>` : "";
        
        let pctR = (rec.avgR / 5) * 100;
        let pctW = (rec.avgW / 5) * 100;
        let pctT = (rec.avgT / 5) * 100;

        html += `
          <div class="timeline-item">
            <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-3">
              <div>
                <span class="badge bg-primary bg-opacity-10 text-primary border border-primary border-opacity-25 rounded-pill mb-1">สัปดาห์ที่ ${rec.week}</span>
                ${isLatest}
                <div class="text-muted small mt-1"><i class="bi bi-calendar2-check"></i> ประเมินเมื่อ: ${rec.date}</div>
              </div>
              <div class="text-end">
                <div class="fs-4 fw-bold text-dark">${rec.totalAvg}</div>
                <div class="small text-muted">เฉลี่ยรวม</div>
              </div>
            </div>
            
            <div class="mb-2"><div class="d-flex justify-content-between small fw-bold"><span>การอ่าน</span><span class="text-primary">${rec.avgR}</span></div><div class="progress"><div class="progress-bar pg-read" style="width: ${pctR}%"></div></div></div>
            <div class="mb-2"><div class="d-flex justify-content-between small fw-bold"><span>การเขียน</span><span class="text-success">${rec.avgW}</span></div><div class="progress"><div class="progress-bar pg-write" style="width: ${pctW}%"></div></div></div>
            <div class="mb-3"><div class="d-flex justify-content-between small fw-bold"><span>การคิด</span><span class="text-danger">${rec.avgT}</span></div><div class="progress"><div class="progress-bar pg-think" style="width: ${pctT}%"></div></div></div>

            <div class="row g-2 mt-3">
              <div class="col-12">${portBtn}</div>
            </div>
          </div>
        `;
      });
      timeline.innerHTML = html;
    }

    function drawRadarChart(dataArr) {
      const ctx = document.getElementById('radarChart').getContext('2d');
      if(myRadarChart) myRadarChart.destroy();
      const cleanData = dataArr.map(v => (v === "" || isNaN(v)) ? 0 : parseFloat(v));

      myRadarChart = new Chart(ctx, {
        type: 'radar',
        data: {
          labels: ['ถอดรหัส', 'คล่องแคล่ว', 'เข้าใจ', 'เขียนถูก', 'ประโยค', 'คลังคำ', 'ระบุประเด็น', 'อนุมาน', 'สรุปความ'],
          datasets: [{
            label: 'คะแนนล่าสุด', data: cleanData, 
            backgroundColor: 'rgba(13, 110, 253, 0.15)', borderColor: '#0d6efd',
            pointBackgroundColor: ['#0d6efd','#0d6efd','#0d6efd','#198754','#198754','#198754','#dc3545','#dc3545','#dc3545'],
            pointRadius: 4, borderWidth: 2
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: {
            r: { 
              suggestedMin: 0, suggestedMax: 5, ticks: { stepSize: 1, display: false },
              pointLabels: { font: { family: 'Sarabun', size: 10, weight: 'bold' }, color: (c) => c.index < 3 ? '#0d6efd' : (c.index < 6 ? '#198754' : '#dc3545') }
            }
          },
          plugins: { legend: { display: false } }
        }
      });
    }

    function logoutParent() {
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
